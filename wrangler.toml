name = "web-portal-signer"
main = "worker/index.ts"
compatibility_date = "2026-06-12"

[vars]
AWS_REGION = "REPLACE_WITH_YOUR_AWS_REGION"
S3_BUCKET_NAME = "REPLACE_WITH_YOUR_S3_BUCKET_NAME"
S3_KEY_PREFIX = "uploads"
MAX_FILE_SIZE_BYTES = "26214400"
PRESIGN_TTL_SECONDS = "300"
ALLOWED_MIME_TYPES = "application/pdf,image/jpeg,image/png,image/webp,text/plain,application/zip,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel"
ALLOWED_ORIGINS = "http://127.0.0.1:3000,http://localhost:3000,http://127.0.0.1:8080,http://localhost:8080,http://127.0.0.1:5173,http://localhost:5173"
